name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,extended]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy, advisory)
        # Gradual typing: disallow_untyped_defs = false. mypy runs as an
        # advisory signal and must not fail the build on pre-existing legacy
        # type gaps in the diagnostic modules.
        continue-on-error: true
        run: mypy src

      - name: Tests + coverage
        run: pytest --cov=src --cov-report=term-missing
